<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Prizma</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>
:root {
    --bg-color: #121212;
    --text-color: #ffffff;
    --nav-bg: #2a2a2a;
    --accent: #1db954;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    color: var(--text-color);
}

body {
    background-color: var(--bg-color);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 80px;
}

.screen { display: none; }
.screen.active { display: block; }

.section-title {
    margin: 20px 0 10px;
    font-size: 18px;
}

.grid-item {
    background: #2a2a2a;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.setting-item {
    display: flex;
    justify-content: space-between;
    padding: 15px 0;
    border-bottom: 1px solid #333;
}

.toggle {
    width: 40px;
    height: 20px;
    background: #555;
    border-radius: 10px;
    position: relative;
}

.toggle::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

.toggle.active { background: var(--accent); }
.toggle.active::after { left: 22px; }

.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 65px;
    background-color: var(--nav-bg);
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 12px;
    color: #aaa;
}

.nav-item.active {
    color: var(--accent);
}

input {
    width: 100%;
    padding: 10px;
    background: #333;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="content">

<div id="home" class="screen active">
    <h2 class="section-title">Início</h2>
    <div class="grid-item">Música 1</div>
    <div class="grid-item">Música 2</div>
</div>

<div id="search" class="screen">
    <input placeholder="Buscar música...">
</div>

<div id="playlists" class="screen">
    <h2 class="section-title">Playlists</h2>
</div>

<div id="settings" class="screen">
    <h2 class="section-title">Aparência</h2>

    <div class="setting-item">
        <span>Wallpaper</span>
    </div>

    <input type="file" id="wallpaper-upload" accept="image/*">

    <h2 class="section-title">Sistema</h2>

    <div class="setting-item">
        <span>Modo Economia</span>
        <div class="toggle" onclick="this.classList.toggle('active')"></div>
    </div>

</div>

</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="navigate('home', this)">🏠</div>
    <div class="nav-item" onclick="navigate('search', this)">🔍</div>
    <div class="nav-item" onclick="navigate('playlists', this)">🎵</div>
    <div class="nav-item" onclick="navigate('settings', this)">⚙️</div>
</div>

<script>

// Navegação
function navigate(id, el) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

// Wallpaper com salvamento
const input = document.getElementById('wallpaper-upload');

input.addEventListener('change', e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = () => {
        document.body.style.backgroundImage = `url(${reader.result})`;
        localStorage.setItem('wallpaper', reader.result);
    };

    reader.readAsDataURL(file);
});

// carregar wallpaper
window.onload = () => {
    const saved = localStorage.getItem('wallpaper');
    if (saved) document.body.style.backgroundImage = `url(${saved})`;
};

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
