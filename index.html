<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prizma</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>
:root{
--accent:#1db954;
}

/* BASE */
body{
margin:0;
font-family:sans-serif;
color:white;
background:#000;
}

/* WALL */
.wall{
position:fixed;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(10px);
opacity:0.4;
z-index:-1;
}

/* HEADER */
.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* CONTAINER */
.container{
padding:15px;
padding-bottom:100px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
margin-bottom:15px;
}

/* PLAYER */
.player-controls{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

/* TOGGLE */
.toggle{
width:40px;height:20px;background:#555;border-radius:10px;position:relative;
}
.toggle::after{
content:"";width:16px;height:16px;background:white;border-radius:50%;
position:absolute;top:2px;left:2px;transition:.3s;
}
.toggle.active{background:var(--accent);}
.toggle.active::after{left:22px;}

.setting{
display:flex;
justify-content:space-between;
margin:10px 0;
}

/* NAV */
.nav{
position:fixed;
bottom:15px;
left:10px;
right:10px;
height:65px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-radius:30px;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav div{color:#aaa;}
.nav .active{color:white;}

.screen{display:none;}
.active-screen{display:block;}

input,select{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
}
</style>
</head>

<body>

<div class="wall" id="wall"></div>

<div class="header">Prizma 🎧</div>

<div class="container">

<!-- HOME -->
<div id="home" class="screen active-screen">

<div class="card">
<h3>🎵 Player</h3>

<input type="file" id="musicFile" multiple accept="audio/*">

<p id="musicName">Nenhuma música</p>

<audio id="audio"></audio>

<div class="player-controls">
<button onclick="back()">⏮️</button>
<button onclick="playPause()">⏯️</button>
<button onclick="next()">⏭️</button>
</div>

<input type="range" id="progress">

</div>

</div>

<!-- SETTINGS -->
<div id="settings" class="screen">

<div class="card">
<h3>🎧 Reprodução</h3>

<select id="speed">
<option value="1">1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<div class="setting"><span>Shuffle</span><div class="toggle" id="shuffle" onclick="t(this)"></div></div>

<div class="setting"><span>Repeat</span><div class="toggle" id="repeat" onclick="t(this)"></div></div>

</div>

<div class="card">
<h3>📶 Dados</h3>

<select>
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>

<div class="setting"><span>Modo economia</span><div class="toggle" onclick="t(this)"></div></div>

<button onclick="alert('Cache limpo')">Limpar cache</button>

</div>

<div class="card">
<h3>🎨 Aparência</h3>

<input type="file" id="wp">

<input type="range" min="0.2" max="0.6" step="0.05" id="op">

</div>

<div class="card">
<h3>🔊 Bluetooth</h3>

<div class="setting"><span>Pausar ao desconectar</span><div class="toggle active"></div></div>
<div class="setting"><span>Retomar</span><div class="toggle active"></div></div>

</div>

<div class="card">
<h3>🧠 Extras</h3>

<div class="setting"><span>Sleep timer</span><div class="toggle" onclick="sleep()"></div></div>

</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="go('home',this)" class="active">🏠</div>
<div onclick="go('settings',this)">⚙️</div>
</div>

<script>

// NAV
function go(id,el){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active-screen'));
document.getElementById(id).classList.add('active-screen');
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'));
el.classList.add('active');
}

// TOGGLE
function t(el){el.classList.toggle('active');}

// PLAYER
let audio=document.getElementById("audio");
let progress=document.getElementById("progress");
let musicName=document.getElementById("musicName");

let playlist=[];
let current=0;

document.getElementById("musicFile").onchange=e=>{
let files=Array.from(e.target.files);
playlist=[];
files.forEach(f=>{
playlist.push({name:f.name,src:URL.createObjectURL(f)});
});
load(0);
};

function load(i){
current=i;
audio.src=playlist[i].src;
musicName.innerText=playlist[i].name;
audio.play();
}

function playPause(){audio.paused?audio.play():audio.pause();}

function next(){
if(document.getElementById("shuffle").classList.contains("active")){
load(Math.floor(Math.random()*playlist.length));
return;
}
if(current<playlist.length-1){load(current+1);}
else if(document.getElementById("repeat").classList.contains("active")){
load(0);
}
}

function back(){if(current>0)load(current-1);}

audio.ontimeupdate=()=>{
progress.value=(audio.currentTime/audio.duration)*100||0;
};

progress.oninput=()=>{
audio.currentTime=(progress.value/100)*audio.duration;
};

audio.onended=()=>next();

// VELOCIDADE
document.getElementById("speed").onchange=e=>{
audio.playbackRate=e.target.value;
};

// WALLPAPER
let wall=document.getElementById("wall");

document.getElementById("wp").onchange=e=>{
let r=new FileReader();
r.onload=()=>{
wall.style.backgroundImage=`url(${r.result})`;
localStorage.setItem("wall",r.result);
};
r.readAsDataURL(e.target.files[0]);
};

window.onload=()=>{
let w=localStorage.getItem("wall");
if(w)wall.style.backgroundImage=`url(${w})`;
};

// OPACIDADE
document.getElementById("op").oninput=e=>{
wall.style.opacity=e.target.value;
};

// SLEEP
function sleep(){
setTimeout(()=>audio.pause(),1800000);
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
